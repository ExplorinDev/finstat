steps:
  # Download git-lfs, add to PATH, pull LFS files (dev.db)
  - name: "gcr.io/cloud-builders/git"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        curl -sL https://github.com/git-lfs/git-lfs/releases/download/v3.6.1/git-lfs-linux-amd64-v3.6.1.tar.gz | tar xz -C /tmp
        cp /tmp/git-lfs-3.6.1/git-lfs /usr/local/bin/git-lfs
        git lfs install
        git lfs pull
        echo "dev.db size:" && ls -lh prisma/dev.db

  # Ensure Artifact Registry repository exists
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud artifacts repositories describe finstat \
          --location=europe-central2 \
          --project=$PROJECT_ID 2>/dev/null \
        || gcloud artifacts repositories create finstat \
          --repository-format=docker \
          --location=europe-central2 \
          --project=$PROJECT_ID

  # Build Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - europe-central2-docker.pkg.dev/$PROJECT_ID/finstat/app:$COMMIT_SHA
      - -t
      - europe-central2-docker.pkg.dev/$PROJECT_ID/finstat/app:latest
      - .

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - europe-central2-docker.pkg.dev/$PROJECT_ID/finstat/app

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - finstat
      - --image=europe-central2-docker.pkg.dev/$PROJECT_ID/finstat/app:$COMMIT_SHA
      - --region=europe-central2
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=8080

options:
  logging: CLOUD_LOGGING_ONLY
